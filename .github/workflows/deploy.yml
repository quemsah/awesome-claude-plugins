name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Clone repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ui

      - name: Validate catalog data
        run: npm run validate:data
        working-directory: ui

      - name: Run linter
        run: npm run lint
        working-directory: ui

      - name: Run typecheck
        run: npm run typecheck
        working-directory: ui

      - name: Run tests
        run: npm test
        working-directory: ui

      - name: Build production app
        run: npm run build
        working-directory: ui

  production-ready:
    name: production-ready
    needs: verify
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Mark verified production candidate
        run: echo "Production deployment may proceed for this verified commit."
